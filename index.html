<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Frontend Journey</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.google.com/specimen/Playfair+Display" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- NAVBAR -->
<nav>
    <div class="logo">LOGO</div>

    <div class="nav-links" id="navLinks">
        <a href="#">Home</a>
        <a href="#">Project</a>
        <a href="#">Internship</a>
        <a href="#">Contact</a>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search...">
            <button onclick="openPopup()">Search</button>
        </div>
    </div>

    <div class="hamburger" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
    </div>
</nav>

<!-- HERO -->
<section class="hero">
    <h1>Front-End Developer Internship</h1>
    <p>Learning, building and improving frontend skills every day 🚀</p>
    <p>Setup & Deployment(Completed)</p>
</section>

<!-- BUTTON SECTION -->
<section class="buttons-section">
    <h2>Button Component System</h2>

    <div class="button-row">
        <div class="label">Primary Buttons</div>
        <button class="btn btn-primary">Default</button>
        <button class="btn btn-primary">Hover</button>
        <button class="btn btn-primary">Active</button>
        <button class="btn btn-primary" disabled>Disabled</button>
    </div>

    <div class="button-row">
        <div class="label">Secondary Buttons</div>
        <button class="btn btn-outline">Default</button>
        <button class="btn btn-outline">Hover</button>
        <button class="btn btn-outline">Active</button>
        <button class="btn btn-outline" disabled>Disabled</button>
    </div>
</section>

<!-- FOOTER -->
<footer>
    © 2026 | Made with ❤️ by Unnati Pitla
</footer>

<!-- POPUP -->
<div class="modal" id="popup">
    <div class="modal-content">
        <h3>✨ Cute Search Message ✨</h3>
        <p id="popupText"></p>
        <button onclick="closePopup()">Close</button>
    </div>
</div>

    <script src="js/script.js"></script>

</body>
</html>
